# webapp.yaml - Template de CloudFormation para WebApp
# Crea S3 bucket con versionado, CloudFront distribution y bucket policy
#
# Autor: Generated by Kiro
# Fecha: 2026-07-10
#
# Uso: aws cloudformation deploy --template-file webapp.yaml --stack-name webapp-dev

AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Template para desplegar una aplicacion web estatica en AWS.
  Crea: S3 Bucket con versionado, CloudFront Distribution, y Bucket Policy.

# Metadata con informacion del template
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Configuracion del Proyecto
        Parameters:
          - ProjectName
          - Environment
      - Label:
          default: Configuracion del Bucket S3
        Parameters:
          - EnableVersioning
      - Label:
          default: Configuracion de CloudFront
        Parameters:
          - EnableLogging
    ParameterLabels:
      ProjectName:
        default: Nombre del Proyecto
      Environment:
        default: Ambiente
      EnableVersioning:
        default: Habilitar Versionado
      EnableLogging:
        default: Habilitar Logging

# Parametros configurables
Parameters:
  ProjectName:
    Type: String
    Description: Nombre del proyecto (max 32 caracteres)
    Default: webapp
    MinLength: 1
    MaxLength: 32
    ConstraintDescription: Debe tener entre 1 y 32 caracteres

  Environment:
    Type: String
    Description: Ambiente de despliegue (dev, staging, production)
    Default: dev
    AllowedValues:
      - dev
      - staging
      - production
    ConstraintDescription: Debe ser dev, staging o production

  EnableVersioning:
    Type: String
    Description: Habilitar versionado del bucket S3
    Default: true
    AllowedValues:
      - true
      - false

  EnableLogging:
    Type: String
    Description: Habilitar logging de accesos
    Default: false
    AllowedValues:
      - true
      - false

# Recursos a crear
Resources:

  # S3 Bucket para assets estaticos
  WebAppBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${ProjectName}-${Environment}-assets'
      VersioningConfiguration:
        Status: !If
          - EnableVersioningCondition
          - Enabled
          - Suspended
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  # Bucket Policy que solo permite acceso desde CloudFront
  WebAppBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebAppBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontAccess
            Effect: Allow
            Principal:
              AWS: !GetAtt CloudFrontOriginAccessIdentity.Arn
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt WebAppBucket.Arn
              - !Sub '${WebAppBucket.Arn}/*'

  # Origin Access Identity para CloudFront
  CloudFrontOriginAccessIdentity:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub '${ProjectName}-${Environment} OAI'

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        IsIPv6Enabled: true
        Comment: !Sub '${ProjectName}-${Environment} Distribution'
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WebAppBucket.DomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOriginAccessIdentity}'
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          TargetOriginId: S3Origin
          ForwardedValues:
            QueryString: false
            Headers: []
            Cookies:
              Forward: none
          ViewerProtocolPolicy: redirect-to-https
          MinTTL: 0
          DefaultTTL: 3600
          MaxTTL: 86400
          Compress: true
        CacheBehaviors:
          - PathPattern: /static/*
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
              - OPTIONS
            TargetOriginId: S3Origin
            ForwardedValues:
              QueryString: false
              Headers: []
              Cookies:
                Forward: none
            ViewerProtocolPolicy: redirect-to-https
            MinTTL: 0
            DefaultTTL: 86400
            MaxTTL: 604800
            Compress: true
        Tags:
          - Key: Project
            Value: !Ref ProjectName
          - Key: Environment
            Value: !Ref Environment
          - Key: ManagedBy
            Value: CloudFormation

# Condiciones para valores condicionales
Conditions:
  EnableVersioningCondition: !Equals [!Ref EnableVersioning, true]
  EnableLoggingCondition: !Equals [!Ref EnableLogging, true]

# Salidas (Outputs) con URLs y ARNs
Outputs:
  WebAppBucketId:
    Description: ID del bucket S3 creado
    Value: !Ref WebAppBucket

  WebAppBucketArn:
    Description: ARN del bucket S3 creado
    Value: !GetAtt WebAppBucket.Arn

  WebAppBucketDomainName:
    Description: Nombre de dominio del bucket S3
    Value: !GetAtt WebAppBucket.DomainName

  CloudFrontDistributionId:
    Description: ID de la distribucion CloudFront
    Value: !Ref CloudFrontDistribution

  CloudFrontDistributionDomain:
    Description: Nombre de dominio de la distribucion CloudFront
    Value: !GetAtt CloudFrontDistribution.DomainName

  CloudFrontDistributionUrl:
    Description: URL base de la distribucion CloudFront
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'

  CloudFrontOriginAccessIdentityArn:
    Description: ARN de la Identity Access Management (OAI) de CloudFront
    Value: !GetAtt CloudFrontOriginAccessIdentity.IamCloudFrontOriginAccessIdentity

  CloudFrontOriginAccessIdentityCanonicalUserId:
    Description: Canonical User ID de la OAI (para usar en policies)
    Value: !GetAtt CloudFrontOriginAccessIdentity.CanonicalUser_id